<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="third_lib/bootstrap.min.css">
  <link rel="stylesheet" href="third_lib/highlight/styles/github.min.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="third_lib/highlight/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="panel.css">
</head>
<body class="d-flex flex-column vh-100 overflow-hidden">
  <!-- Toolbar -->
  <div class="toolbar d-flex align-items-center px-2 gap-1 border-bottom flex-shrink-0">
    <button id="clear" class="btn btn-sm btn-outline-secondary py-0 px-2" title="Clear all captured requests">Clear</button>
    <span id="count" class="small text-muted">0 requests</span>
  </div>

  <!-- Main Tabs -->
  <ul class="nav nav-tabs px-2 flex-shrink-0" id="main-tabs" role="tablist">
    <li class="nav-item">
      <button class="nav-link active py-1 px-3 small" data-bs-toggle="tab"
              data-bs-target="#tab-http-history" type="button" role="tab">HTTP History</button>
    </li>
    <li class="nav-item">
      <button class="nav-link py-1 px-3 small" data-bs-toggle="tab"
              data-bs-target="#tab-session-config" type="button" role="tab">Session Config</button>
    </li>
  </ul>

  <!-- Tab Content -->
  <div class="tab-content flex-grow-1 overflow-hidden" id="main-tab-content">
    <!-- HTTP History Tab -->
    <div class="tab-pane fade show active h-100" id="tab-http-history" role="tabpanel">
      <div class="d-flex flex-row h-100">
        <!-- Request Table Area (Left) -->
        <div class="d-flex flex-column overflow-hidden" id="request-table-area" style="flex:0 0 40%;min-width:200px;max-width:70%">
          <div class="d-flex align-items-center px-2 py-0 border-bottom flex-shrink-0" style="height:24px">
            <div class="form-check form-check-inline mb-0">
              <input class="form-check-input" type="checkbox" id="filter-css-img" style="width:14px;height:14px">
              <label class="form-check-label small" for="filter-css-img">Hide CSS/Image/Font</label>
            </div>
            <button class="btn btn-sm btn-outline-secondary py-0 px-1 ms-auto" id="col-config-btn" title="Configure visible columns" style="font-size:10px">Columns</button>
          </div>
          <div class="flex-grow-1 overflow-auto" id="request-table-scroll">
            <table id="request-table" class="table table-sm table-striped table-hover mb-0 small" style="table-layout:auto;white-space:nowrap">
              <thead class="table-light sticky-top">
                <tr>
                  <th data-col="index" data-mandatory="true" style="width:32px">#</th>
                  <th data-col="method" data-mandatory="true" style="width:60px">Method</th>
                  <th data-col="host">Host</th>
                  <th data-col="url" data-mandatory="true">Path</th>
                  <th data-col="status" style="width:60px">Status</th>
                  <th data-col="length" style="width:50px">Length</th>
                  <th data-col="time" style="width:70px">Time</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <!-- Table Resizer (Horizontal) -->
        <div class="resizer resizer-horizontal flex-shrink-0" id="table-resizer"></div>

        <!-- HTTP Detail Area (Right) -->
        <div class="d-flex flex-column overflow-hidden" id="http-detail-area" style="flex:1 1 60%;min-width:300px">
          <!-- Layout Bar -->
          <div class="layout-bar d-flex align-items-center justify-content-center gap-1 px-1 border-bottom flex-shrink-0">
            <button class="btn btn-sm btn-outline-secondary py-0 px-1 layout-btn" data-layout="vertical" title="Vertical layout (top/bottom)">&#8597;</button>
            <button class="btn btn-sm btn-outline-secondary py-0 px-1 layout-btn" data-layout="horizontal" title="Horizontal layout (left/right)">&#8596;</button>
            <button class="btn btn-sm btn-outline-secondary py-0 px-1 layout-btn" data-layout="tabs" title="Tab layout (switch panels)">&#9776;</button>
            <!-- Tab layout switcher (visible only in tabs mode) -->
            <div class="tab-pane-switcher d-none ms-2 gap-1">
              <button class="btn btn-sm btn-primary py-0 px-2 pane-tab-btn active" data-target="request" title="Show Request">Request</button>
              <button class="btn btn-sm btn-outline-primary py-0 px-2 pane-tab-btn" data-target="response" title="Show Response">Response</button>
            </div>
          </div>
          <!-- Request/Response Panes -->
          <div class="content flex-grow-1 d-flex overflow-hidden layout-vertical">
            <!-- Request Pane -->
            <div class="pane" id="request-pane">
              <div class="pane-header d-flex align-items-center px-1 border-bottom flex-shrink-0">
                <div class="tab-nav d-flex">
                  <button class="tab-btn active" data-tab="raw" data-pane="request">Raw</button>
                  <button class="tab-btn" data-tab="pretty" data-pane="request">Pretty</button>
                  <button class="tab-btn" data-tab="hex" data-pane="request">Hex</button>
                </div>

                <div class="pane-actions d-flex gap-1 ms-auto">
                  <button class="btn btn-sm btn-outline-info py-0 px-1 copy-session-btn" id="copy-req-session" title="Copy extracted session data">Session</button>
                  <button class="btn btn-sm btn-outline-secondary py-0 px-1" id="copy-req-headers" title="Copy request headers only">Headers</button>
                  <button class="btn btn-sm btn-outline-secondary py-0 px-1" id="copy-req-body" title="Copy request body (text only)" disabled>Body</button>
                  <button class="btn btn-sm btn-outline-secondary py-0 px-1" id="copy-req" title="Copy full request">Copy</button>
                  <button class="btn btn-sm btn-outline-secondary py-0 px-1" id="download-req" title="Download full request as file">Download</button>
                </div>
              </div>
              <div class="tab-content active" data-tab="raw">
                <div class="code-view">
                  <div class="line-numbers" id="req-line-numbers-raw"></div>
                  <textarea id="raw-request" readonly placeholder="Select a request..."></textarea>
                </div>
              </div>
              <div class="tab-content" data-tab="pretty">
                <div class="code-view">
                  <div class="line-numbers" id="req-line-numbers-pretty"></div>
                  <pre class="mb-0 flex-grow-1 overflow-auto p-1"><code id="pretty-request" class="hljs"></code></pre>
                </div>
              </div>
              <div class="tab-content" data-tab="hex">
                <div class="hex-view">
                  <div class="hex-display" id="hex-request"></div>
                </div>
              </div>
              <!-- Search Bar (bottom, Burp Suite style) -->
              <div class="pane-search-bar d-flex align-items-center px-1 border-top flex-shrink-0">
                <button class="btn btn-outline-secondary py-0 px-1 search-opt-btn" id="req-search-regex" title="Toggle regex search">.*</button>
                <button class="btn btn-outline-secondary py-0 px-1 search-opt-btn" id="req-search-case" title="Toggle case sensitive">Aa</button>
                <button class="btn btn-outline-secondary py-0 px-1 search-nav-btn" id="req-search-prev" title="Previous match">&#9664;</button>
                <button class="btn btn-outline-secondary py-0 px-1 search-nav-btn" id="req-search-next" title="Next match">&#9654;</button>
                <div class="search-input-wrapper">
                  <input type="text" class="form-control form-control-sm py-0 search-input" id="req-search-input" placeholder="Search">
                  <span class="search-input-icon search-icon-state" id="req-search-icon" title="Search">&#128269;</span>
                </div>
                <span class="search-count small text-muted" id="req-search-count">0 highlights</span>
              </div>
            </div>

            <!-- Pane Resizer -->
            <div class="resizer resizer-vertical" id="resizer"></div>

            <!-- Response Pane -->
            <div class="pane" id="response-pane">
              <div class="pane-header d-flex align-items-center px-1 border-bottom flex-shrink-0">

                <div class="tab-nav d-flex">
                  <button class="tab-btn active" data-tab="raw" data-pane="response">Raw</button>
                  <button class="tab-btn" data-tab="pretty" data-pane="response">Pretty</button>
                  <button class="tab-btn" data-tab="hex" data-pane="response">Hex</button>
                </div>
                <div class="pane-actions d-flex gap-1 ms-auto">
                  <button class="btn btn-sm btn-outline-info py-0 px-1 copy-session-btn" id="copy-res-session" title="Copy extracted session data">Session</button>
                  <button class="btn btn-sm btn-outline-secondary py-0 px-1" id="copy-res-headers" title="Copy response headers only">Headers</button>
                  <button class="btn btn-sm btn-outline-secondary py-0 px-1" id="copy-res-body" title="Copy response body (text only)" disabled>Body</button>
                  <button class="btn btn-sm btn-outline-secondary py-0 px-1" id="copy-res" title="Copy full response">Copy</button>
                  <button class="btn btn-sm btn-outline-secondary py-0 px-1" id="download-res" title="Download full response as file">Download</button>
                </div>
              </div>
              <div class="tab-content active" data-tab="raw">
                <div class="code-view">
                  <div class="line-numbers" id="res-line-numbers-raw"></div>
                  <textarea id="raw-response" readonly placeholder="Select a request..."></textarea>
                </div>
              </div>
              <div class="tab-content" data-tab="pretty">
                <div class="code-view">
                  <div class="line-numbers" id="res-line-numbers-pretty"></div>
                  <pre class="mb-0 flex-grow-1 overflow-auto p-1"><code id="pretty-response" class="hljs"></code></pre>
                </div>
              </div>
              <div class="tab-content" data-tab="hex">
                <div class="hex-view">
                  <div class="hex-display" id="hex-response"></div>
                </div>
              </div>
              <!-- Search Bar (bottom, Burp Suite style) -->
              <div class="pane-search-bar d-flex align-items-center px-1 border-top flex-shrink-0">
                <button class="btn btn-outline-secondary py-0 px-1 search-opt-btn" id="res-search-regex" title="Toggle regex search">.*</button>
                <button class="btn btn-outline-secondary py-0 px-1 search-opt-btn" id="res-search-case" title="Toggle case sensitive">Aa</button>
                <button class="btn btn-outline-secondary py-0 px-1 search-nav-btn" id="res-search-prev" title="Previous match">&#9664;</button>
                <button class="btn btn-outline-secondary py-0 px-1 search-nav-btn" id="res-search-next" title="Next match">&#9654;</button>
                <div class="search-input-wrapper">
                  <input type="text" class="form-control form-control-sm py-0 search-input" id="res-search-input" placeholder="Search">
                  <span class="search-input-icon search-icon-state" id="res-search-icon" title="Search">&#128269;</span>
                </div>
                <span class="search-count small text-muted" id="res-search-count">0 highlights</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Session Config Tab -->
    <div class="tab-pane fade h-100" id="tab-session-config" role="tabpanel">
      <div class="d-flex flex-column h-100 p-1">
        <ul class="nav nav-pills flex-shrink-0 mb-1" id="session-sub-tabs" role="tablist">
          <li class="nav-item">
            <button class="nav-link active py-1 px-2 small" data-bs-toggle="pill"
                    data-bs-target="#session-fields-tab" type="button">Fields</button>
          </li>
          <li class="nav-item">
            <button class="nav-link py-1 px-2 small" data-bs-toggle="pill"
                    data-bs-target="#session-schemes-tab" type="button">Schemes</button>
          </li>
        </ul>
        <div class="tab-content flex-grow-1 overflow-hidden">
          <!-- Fields Management -->
          <div class="tab-pane fade show active h-100" id="session-fields-tab" role="tabpanel">
            <div class="d-flex flex-column h-100">
              <div class="d-flex gap-1 mb-1 flex-shrink-0 align-items-center">
                <button id="add-field-btn" class="btn btn-sm btn-success py-0" title="Create a new session field">New Field</button>
                <input type="text" class="form-control form-control-sm py-0 ms-auto" id="fields-search-input"
                       placeholder="Filter fields..." style="max-width:200px;height:22px;font-size:11px">
              </div>
              <div class="flex-grow-1 overflow-auto">
                <table id="fields-table" class="table table-sm table-striped table-hover table-bordered mb-0 small">
                  <thead class="table-light sticky-top">
                    <tr>
                      <th data-col="index" style="width:32px">#</th>
                      <th data-col="enabled" style="width:50px">On</th>
                      <th data-col="name">Name</th>
                      <th data-col="locationType">Location</th>
                      <th data-col="locationName">Source</th>
                      <th data-col="mode">Mode</th>
                      <th data-col="pattern">Pattern</th>
                      <th data-col="usedBy">Used By</th>
                      <th data-col="actions" style="width:80px">Actions</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
          <!-- Schemes Management -->
          <div class="tab-pane fade h-100" id="session-schemes-tab" role="tabpanel">
            <div class="d-flex flex-column h-100">
              <div class="d-flex gap-1 mb-1 flex-shrink-0 align-items-center">
                <button id="add-scheme-btn" class="btn btn-sm btn-success py-0" title="Create a new session scheme">New Scheme</button>
                <input type="text" class="form-control form-control-sm py-0 ms-auto" id="schemes-search-input"
                       placeholder="Filter schemes..." style="max-width:200px;height:22px;font-size:11px">
              </div>
              <div class="flex-grow-1 overflow-auto">
                <table id="schemes-table" class="table table-sm table-striped table-hover table-bordered mb-0 small">
                  <thead class="table-light sticky-top">
                    <tr>
                      <th data-col="index" style="width:32px">#</th>
                      <th data-col="enabled" style="width:50px">On</th>
                      <th data-col="name">Name</th>
                      <th data-col="domains">Domains</th>
                      <th data-col="regex">Regex</th>
                      <th data-col="description">Description</th>
                      <th data-col="fieldCount" style="width:50px">Fields</th>
                      <th data-col="actions" style="width:80px">Actions</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Field Editor Modal -->
  <div class="modal fade" id="fieldEditorModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header py-1 px-2">
          <h6 class="modal-title small fw-bold">Field Editor</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-2">
          <div class="mb-1">
            <label class="form-label small mb-0">Name</label>
            <input type="text" class="form-control form-control-sm" id="edit-field-name">
          </div>
          <div class="mb-1">
            <label class="form-label small mb-0">Location</label>
            <select class="form-select form-select-sm" id="edit-field-location">
              <option value="header">Header</option>
              <option value="body">Body</option>
            </select>
          </div>
          <div class="mb-1">
            <label class="form-label small mb-0">Source (Header Name / Body)</label>
            <input type="text" class="form-control form-control-sm" id="edit-field-location-name">
          </div>
          <div class="mb-1">
            <label class="form-label small mb-0">Mode</label>
            <select class="form-select form-select-sm" id="edit-field-mode">
              <option value="substring">Substring</option>
              <option value="regex">Regex</option>
              <option value="keyword">Keyword</option>
              <option value="xpath">XPath</option>
              <option value="jsonpath">JSONPath</option>
            </select>
          </div>
          <div class="mb-1">
            <label class="form-label small mb-0">Pattern</label>
            <input type="text" class="form-control form-control-sm" id="edit-field-pattern">
          </div>
        </div>
        <div class="modal-footer py-1 px-2">
          <button class="btn btn-sm btn-secondary py-0" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-sm btn-primary py-0" id="save-field-btn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scheme Editor Modal -->
  <div class="modal fade" id="schemeEditorModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header py-1 px-2">
          <h6 class="modal-title small fw-bold">Scheme Editor</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-2">
          <div class="mb-1">
            <label class="form-label small mb-0">Name</label>
            <input type="text" class="form-control form-control-sm" id="edit-scheme-name">
          </div>
          <div class="mb-1">
            <label class="form-label small mb-0">Target Domains (comma separated)</label>
            <input type="text" class="form-control form-control-sm" id="edit-scheme-domains">
          </div>
          <div class="mb-1">
            <label class="form-label small mb-0">Domain Regex</label>
            <input type="text" class="form-control form-control-sm" id="edit-scheme-regex">
          </div>
          <div class="mb-1">
            <label class="form-label small mb-0">Description</label>
            <input type="text" class="form-control form-control-sm" id="edit-scheme-desc">
          </div>
          <div class="mb-1">
            <label class="form-label small mb-0">Associated Fields</label>
            <div class="dual-list-selector d-flex gap-1" id="scheme-field-selector" style="height:160px">
              <!-- Left: Available fields -->
              <div class="flex-grow-1 d-flex flex-column border rounded overflow-hidden">
                <div class="px-1 py-0 bg-light border-bottom small fw-bold">Available</div>
                <select multiple class="form-select form-select-sm flex-grow-1 border-0 rounded-0"
                        id="available-fields-list" style="font-size:11px"></select>
              </div>
              <!-- Center: Action buttons -->
              <div class="d-flex flex-column justify-content-center gap-1">
                <button type="button" class="btn btn-sm btn-outline-primary py-0 px-1" id="field-move-right" title="Add selected">&gt;</button>
                <button type="button" class="btn btn-sm btn-outline-primary py-0 px-1" id="field-move-left" title="Remove selected">&lt;</button>
                <button type="button" class="btn btn-sm btn-outline-primary py-0 px-1" id="field-move-all-right" title="Add all">&gt;&gt;</button>
                <button type="button" class="btn btn-sm btn-outline-primary py-0 px-1" id="field-move-all-left" title="Remove all">&lt;&lt;</button>
              </div>
              <!-- Right: Selected fields -->
              <div class="flex-grow-1 d-flex flex-column border rounded overflow-hidden">
                <div class="px-1 py-0 bg-light border-bottom small fw-bold">Selected</div>
                <select multiple class="form-select form-select-sm flex-grow-1 border-0 rounded-0"
                        id="selected-fields-list" style="font-size:11px"></select>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer py-1 px-2">
          <button class="btn btn-sm btn-secondary py-0" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-sm btn-primary py-0" id="save-scheme-btn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="third_lib/jquery.min.js"></script>
  <script src="third_lib/bootstrap.bundle.min.js"></script>
  <script src="third_lib/Sortable.min.js"></script>
  <script src="third_lib/highlight/highlight.min.js"></script>
  <script src="third_lib/highlight/languages/http.min.js"></script>
  <script src="third_lib/highlight/languages/json.min.js"></script>
  <script src="third_lib/highlight/languages/xml.min.js"></script>
  <script type="module" src="panel.js"></script>
</body>
</html>
