<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="toolbar">
    <button id="clear">Clear All</button>
    <span id="count">0 requests</span>
  </div>
  <div class="container">
    <div class="sidebar">
      <div id="request-list"></div>
    </div>
    <div class="content">
      <div class="pane">
        <div class="pane-header">
          <span>Raw Request</span>
          <div class="pane-actions">
            <button id="copy-req">Copy</button>
            <button id="download-req">Download</button>
          </div>
        </div>
        <div class="code-view" id="raw-request-view">
          <div class="line-numbers" id="req-line-numbers"></div>
          <textarea id="raw-request" readonly placeholder="Select a request from the left panel..."></textarea>
        </div>
      </div>
      <div class="pane">
        <div class="pane-header">
          <span>Raw Response</span>
          <div class="pane-actions">
            <button id="copy-res">Copy</button>
            <button id="download-res">Download</button>
          </div>
        </div>
        <div class="code-view" id="raw-response-view">
          <div class="line-numbers" id="res-line-numbers"></div>
          <textarea id="raw-response" readonly placeholder="Select a request from the left panel..."></textarea>
        </div>
      </div>
    </div>
  </div>
  <div id="toast"></div>
  <script src="panel.js"></script>
</body>
</html>
